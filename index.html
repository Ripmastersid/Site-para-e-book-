    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // Configuração da Cena
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        const container = document.getElementById('canvas-container');
        
        const width = container.clientWidth;
        const height = container.clientHeight;
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Otimiza para mobile
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        container.appendChild(renderer.domElement);

        // Iluminação
        const light = new THREE.PointLight(0xffffff, 2, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // Carregador 3D com tratamento de erro
        const loader = new THREE.GLTFLoader();
        const modelName = './pessoa-lendo-livro-v2.glb';
        
        console.log('Tentando carregar:', modelName);
        
        loader.load(
            modelName,
            function (gltf) {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5); // Ajuste de tamanho seguro
                model.position.set(0, 0, 0);
                scene.add(model);
                console.log('✅ Modelo 3D carregado com sucesso!');

                // Loop de animação
                function animate() {
                    requestAnimationFrame(animate);
                    model.rotation.y += 0.003; // Rotação suave
                    renderer.render(scene, camera);
                }
                animate();

                // Interação com toque/mouse
                container.addEventListener('touchmove', (e) => {
                    model.rotation.y += e.touches[0].clientX * 0.0001;
                });
                container.addEventListener('mousemove', (e) => {
                    model.rotation.y += e.clientX * 0.0001;
                });
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% carregado');
            },
            function (error) {
                console.error('❌ Erro ao carregar 3D:', error);
                container.innerHTML = '<p style="color:#ff5555; text-align:center; margin-top:50px;">Erro ao carregar modelo 3D. Verifique o console.</p>';
            }
        );

        camera.position.z = 3;

        // Redimensionamento responsivo
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });
    </script>
