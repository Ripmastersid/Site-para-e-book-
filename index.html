        :root { --royal-blue: #4169E1; --navy-blue: #001f3f; --fluor-orange: #FF6B35; --black: #0a0a0a; --dark: #1a1a2e; --bege: #F5F5DC; --white: #ffffff; --gradient-1: linear-gradient(135deg, #001f3f 0%, #4169E1 50%, #FF6B35 100%); --gradient-2: linear-gradient(45deg, #FF6B35, #4169E1); }

        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--fluor-orange); transition: width 0.3s ease; }
        .nav-links a:hover { color: var(--fluor-orange); }
        .nav-links a:hover::after { width: 100%; }
        .mobile-menu { display: none; flex-direction: column; gap: 5px; cursor: pointer; }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: radial-gradient(ellipse at center, var(--dark) 0%, var(--black) 100%); }

        .hero-description { font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); max-width: 700px; margin: 0 auto 40px; line-height: 1.8; }
        .cta-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .btn-primary { background: var(--gradient-2); color: var(--white); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }

        .btn-secondary:hover { background: var(--fluor-orange); color: var(--black); transform: translateY(-3px); }

        .features { padding: 100px 5%; background: var(--dark); }

        .footer-section a { color: rgba(255, 255, 255, 0.8); text-decoration: none; }
        .footer-section a:hover { color: var(--fluor-orange); }
